title: SnagDesk
description: The offline snagging app for UK builders, contractors and inspectors.
url: https://snagdesk.co.uk
lang: en-GB

# Site-wide values used in templates
app_store: https://apps.apple.com/app/id6782388367
email: snagdeskapp@gmail.com
css_version: 9
default_og_image: /screen-markup.png

# Pages keep the exact URLs they already have, including /privacy.html
# and /support.html which are filed with Apple. This setting governs posts.
permalink: /blog/:title/

collections:
  glossary:
    output: true
    permalink: /glossary/:name/

defaults:
  # Blog and glossary are hidden for now: no nav links, not in the sitemap,
  # and noindex so they are not picked up while hidden.
  - scope: { path: "", type: "posts" }
    values:
      layout: post
      noindex: true
  - scope: { path: "", type: "glossary" }
    values:
      layout: glossary-term
      noindex: true

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
